<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#c8a96e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Payslips">
  <meta name="description" content="SA Domestic Staff Payroll & UIF Manager">
  <title>Payslip Manager</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-left">
      <h1>Payslip Manager</h1>
      <div class="subtitle">Domestic Staff · SA</div>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="syncToGitHub()">☁ Sync</button>
  </header>

  <!-- TABS -->
  <nav class="tabs">
    <div class="tab active" data-tab="employees" onclick="switchTab('employees')">
      <span class="tab-icon">👤</span>Staff
    </div>
    <div class="tab" data-tab="timesheet" onclick="switchTab('timesheet')">
      <span class="tab-icon">🕐</span>Hours
    </div>
    <div class="tab" data-tab="payslips" onclick="switchTab('payslips')">
      <span class="tab-icon">📄</span>Payslips
    </div>
    <div class="tab" data-tab="settings" onclick="switchTab('settings')">
      <span class="tab-icon">⚙️</span>Settings
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- EMPLOYEES VIEW -->
    <div class="view active" id="view-employees">
      <div class="section-header">
        <span class="section-title">Employees</span>
        <span class="section-count" id="empCount">0</span>
      </div>
      <div id="empList"></div>
    </div>

    <!-- TIMESHEET VIEW -->
    <div class="view" id="view-timesheet"></div>

    <!-- PAYSLIPS VIEW -->
    <div class="view" id="view-payslips"></div>

    <!-- SETTINGS VIEW -->
    <div class="view" id="view-settings"></div>

  </main>

  <!-- FAB -->
  <button class="btn-add" id="fab" onclick="openAddEmployee()" title="Add Employee">+</button>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- EMPLOYEE MODAL -->
  <div class="modal-overlay" id="empModal" onclick="if(event.target===this)closeEmpModal()">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="empModalTitle">Add Employee</span>
        <button class="modal-close" onclick="closeEmpModal()">✕</button>
      </div>
      <input type="hidden" id="empFormId">

      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input type="text" class="form-control" id="empName" placeholder="e.g. Maria Dlamini">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">ID Number</label>
          <input type="text" class="form-control" id="empIdNum" placeholder="13-digit ID" maxlength="13">
        </div>
        <div class="form-group">
          <label class="form-label">UIF Number</label>
          <input type="text" class="form-control" id="empUif" placeholder="UIF ref">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Job Title</label>
        <input type="text" class="form-control" id="empRole" placeholder="e.g. Domestic Worker">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="date" class="form-control" id="empStartDate">
        </div>
        <div class="form-group">
          <label class="form-label">Hourly Rate (R) *</label>
          <input type="number" class="form-control" id="empRate" placeholder="e.g. 25.00" min="0" step="0.50">
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="saveEmployee()" style="margin-top:8px;">Save Employee</button>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
